# encoding: utf-8
# 月靈·全備
# 版本: 20260425
#
---
name: "yueling_complete"
version: "20260514"
sort: original
import_tables:
  # 以下是簡碼字詞，空格上屏
  - yuhao/yueling.quick
  # 以下是簡碼字詞，韻碼上屏
  - yuhao/yueling.pop
  # 以下是單字全碼，包括陸標、臺標、港標、兼容拆分
  - yuhao/yueling.full
  # 以下是高優先級用户自定义詞庫
  - yuhao/yuhao.private
  # 以下是字根提示
  - yuhao/yueling.roots
  # 以下是全碼詞庫
  - yuhao/yueling_sc.words 
  - yuhao/yueling_tc.words
  # 以下是低優先級用户自定义詞庫
  - yuhao/yuhao.extended
  # 以下是符號
  - yuhao/yuhao.symbols
  - yuhao/yuhao.symbols_kuai.dict
columns:
  - text
  - code
encoder:
  exclude_patterns:
    - "^[a-z]$"
    - "[^a-z]"
  rules:
    - length_equal: 2
      formula: "AaAbBaBb"
    - length_equal: 3
      formula: "AaBaCaCb"
    - length_in_range: [4, 20]
      formula: "AaBaCaZa"
...